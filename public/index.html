<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>케어보이스 - 요양시설 솔직 후기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2D6A4F;
      --primary-light: #52B788;
      --accent: #F4A261;
      --bg: #F8FAF9;
      --white: #FFFFFF;
      --text: #1B2D27;
      --text-muted: #6B8C82;
      --border: #D8EAE3;
      --danger: #E63946;
      --star-on: #F4A261;
      --star-off: #D8EAE3;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* 헤더 */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--primary);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 16px;
    }

    .logo-text {
      font-size: 18px;
      font-weight: 700;
      color: var(--primary);
    }

    .btn-write {
      background: var(--primary);
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }

    .btn-write:hover { background: #1F5038; }

    /* 히어로 */
    .hero {
      background: linear-gradient(135deg, var(--primary) 0%, #1F5038 100%);
      color: white;
      padding: 48px 24px;
      text-align: center;
    }

    .hero-badge {
      display: inline-block;
      background: rgba(255,255,255,0.15);
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 12px;
      margin-bottom: 16px;
    }

    .hero h1 {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 12px;
    }

    .hero h1 span {
      color: var(--accent);
    }

    .hero p {
      font-size: 15px;
      opacity: 0.85;
      line-height: 1.6;
      max-width: 400px;
      margin: 0 auto 24px;
    }

    .hero-stats {
      display: flex;
      justify-content: center;
      gap: 32px;
    }

    .stat {
      text-align: center;
    }

    .stat-num {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-label {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 2px;
    }

    /* 검색 */
    .search-section {
      background: var(--white);
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
    }

    .search-row {
      display: flex;
      gap: 8px;
      max-width: 600px;
      margin: 0 auto;
    }

    .search-input {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus { border-color: var(--primary-light); }

    .search-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      max-width: 600px;
      margin: 10px auto 0;
      flex-wrap: wrap;
    }

    .filter-select {
      padding: 6px 12px;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      background: var(--white);
      cursor: pointer;
    }

    /* 메인 */
    .main {
      max-width: 640px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
    }

    .review-count {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* 후기 카드 */
    .review-card {
      background: var(--white);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .facility-info {}

    .facility-name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .facility-meta {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .facility-type-badge {
      background: var(--bg);
      color: var(--primary);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
    }

    .region-text {
      font-size: 12px;
      color: var(--text-muted);
    }

    .overall-score {
      text-align: center;
      background: var(--primary);
      color: white;
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .score-num {
      font-size: 18px;
      font-weight: 700;
      line-height: 1;
    }

    .score-label {
      font-size: 9px;
      opacity: 0.8;
    }

    /* 별점 바 */
    .rating-bars {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: 14px;
    }

    .rating-bar-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .bar-label {
      font-size: 11px;
      color: var(--text-muted);
      width: 36px;
      flex-shrink: 0;
    }

    .bar-track {
      flex: 1;
      height: 4px;
      background: var(--star-off);
      border-radius: 2px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      background: var(--primary-light);
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    .bar-val {
      font-size: 11px;
      font-weight: 600;
      color: var(--primary);
      width: 20px;
      text-align: right;
    }

    /* 후기 본문 */
    .review-content {
      font-size: 14px;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 14px;
      word-break: keep-all;
    }

    .review-content.collapsed {
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .expand-btn {
      background: none;
      border: none;
      color: var(--primary);
      font-size: 13px;
      cursor: pointer;
      padding: 0;
      font-family: inherit;
      margin-bottom: 12px;
    }

    .card-bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .card-meta {
      font-size: 12px;
      color: var(--text-muted);
    }

    .card-actions {
      display: flex;
      gap: 8px;
    }

    .action-btn {
      background: none;
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      color: var(--text-muted);
      transition: all 0.2s;
    }

    .action-btn:hover {
      border-color: var(--primary-light);
      color: var(--primary);
    }

    .action-btn.helpful {
      color: var(--primary);
      border-color: var(--primary-light);
    }

    /* 빈 상태 */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    /* 시설 카드 */
    .facility-card {
      background: var(--white);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 10px;
      border: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .facility-card-info { min-width: 0; }

    .facility-card-name {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .facility-card-meta {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .facility-card-badge {
      background: var(--bg);
      color: var(--primary);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
      white-space: nowrap;
    }

    .facility-card-date {
      font-size: 11px;
      color: var(--text-muted);
    }

    .facility-card-btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 8px 14px;
      border-radius: 16px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .facility-notice {
      text-align: center;
      padding: 24px;
      color: var(--text-muted);
      font-size: 13px;
      background: var(--white);
      border-radius: 12px;
      border: 1px dashed var(--border);
      margin-bottom: 12px;
    }

    .facility-type-tag {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 8px;
      font-weight: 600;
      white-space: nowrap;
    }
    .facility-type-tag.home { background: #FFF3E0; color: #E76F00; }
    .facility-type-tag.visit { background: #E3F2FD; color: #1565C0; }
    .facility-type-tag.day { background: #F3E5F5; color: #7B1FA2; }
    .facility-type-tag.etc { background: var(--bg); color: var(--primary); }

    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
    .empty-desc { font-size: 14px; line-height: 1.6; }

    /* 모달 오버레이 */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      overflow-y: auto;
      padding: 20px;
    }

    .modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; }

    .modal {
      background: var(--white);
      border-radius: 16px;
      width: 100%;
      max-width: 560px;
      padding: 28px 24px;
      margin: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .modal-title { font-size: 18px; font-weight: 700; }

    .modal-close {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: var(--text-muted);
      line-height: 1;
    }

    /* 폼 */
    .form-section {
      margin-bottom: 20px;
    }

    .form-section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    .form-group { margin-bottom: 14px; }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text);
    }

    .form-label .required { color: var(--danger); }
    .form-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      background: var(--white);
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--primary-light);
    }

    .form-textarea {
      resize: vertical;
      min-height: 120px;
      line-height: 1.6;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    /* 별점 입력 */
    .star-rating-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .star-item {}

    .star-item-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .stars {
      display: flex;
      gap: 3px;
    }

    .star {
      font-size: 22px;
      cursor: pointer;
      color: var(--star-off);
      transition: color 0.1s;
      user-select: none;
    }

    .star.on { color: var(--star-on); }
    .star:hover { transform: scale(1.1); }

    .overall-star-item {
      grid-column: 1 / -1;
      background: var(--bg);
      padding: 12px;
      border-radius: 8px;
    }

    .overall-star-item .star { font-size: 28px; }

    /* 제출 버튼 */
    .submit-btn {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      margin-top: 8px;
      transition: background 0.2s;
    }

    .submit-btn:hover { background: #1F5038; }
    .submit-btn:disabled { background: var(--text-muted); cursor: not-allowed; }

    .char-count {
      font-size: 11px;
      color: var(--text-muted);
      text-align: right;
      margin-top: 4px;
    }

    /* 알림 */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: white;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 14px;
      z-index: 300;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { background: var(--primary); }
    .toast.error { background: var(--danger); }

    @media (max-width: 480px) {
      .form-row { grid-template-columns: 1fr; }
      .star-rating-group { grid-template-columns: 1fr; }
      .overall-star-item { grid-column: 1; }
      .hero h1 { font-size: 22px; }
      .hero-stats { gap: 20px; }
    }
  </style>
</head>
<body>

<header>
  <a class="logo" href="/">
    <div class="logo-icon">💚</div>
    <span class="logo-text">케어보이스</span>
  </a>
  <button class="btn-write" onclick="openModal()">후기 쓰기</button>
</header>

<div class="hero">
  <div class="hero-badge">✓ 장기요양인정번호 인증 후기만</div>
  <h1>요양시설 <span>솔직한</span> 후기,<br>익명으로 안전하게</h1>
  <p>부모님 요양원 찾을 때 진짜 정보가 필요했던 분들이 직접 씁니다</p>
  <div class="hero-stats">
    <div class="stat">
      <div class="stat-num" id="total-count">0</div>
      <div class="stat-label">등록된 후기</div>
    </div>
    <div class="stat">
      <div class="stat-num">익명</div>
      <div class="stat-label">100% 익명 보장</div>
    </div>
    <div class="stat">
      <div class="stat-num">인증</div>
      <div class="stat-label">실이용자 검증</div>
    </div>
  </div>
</div>

<div class="search-section">
  <div class="search-row">
    <input type="text" class="search-input" id="search-input" placeholder="요양원, 요양병원 이름 검색... (지역 선택 권장)" />
    <button class="search-btn" onclick="searchFacilities()">검색</button>
  </div>
  <div class="filter-row">
    <select class="filter-select" id="filter-type" onchange="search()">
      <option value="">전체 시설(후기)</option>
      <option value="요양원">요양원</option>
      <option value="요양병원">요양병원</option>
      <option value="주야간보호">주야간보호</option>
      <option value="방문요양">방문요양</option>
    </select>
    <select class="filter-select" id="filter-region" onchange="searchFacilities()">
      <option value="">전국</option>
      <option value="11">서울</option>
      <option value="26">부산</option>
      <option value="27">대구</option>
      <option value="28">인천</option>
      <option value="29">광주</option>
      <option value="30">대전</option>
      <option value="31">울산</option>
      <option value="36">세종</option>
      <option value="41">경기</option>
      <option value="43">충북</option>
      <option value="44">충남</option>
      <option value="46">전남</option>
      <option value="47">경북</option>
      <option value="48">경남</option>
      <option value="50">제주</option>
      <option value="51">강원</option>
      <option value="52">전북</option>
    </select>
  </div>
</div>

<div class="main">
  <div class="section-header">
    <span class="section-title">요양시설 검색 결과</span>
    <span class="review-count" id="facility-result-count"></span>
  </div>
  <div id="facilities-container"></div>

  <div class="section-header" style="margin-top:32px;">
    <span class="section-title">최근 후기</span>
    <span class="review-count" id="result-count"></span>
  </div>
  <div id="reviews-container"></div>
</div>

<!-- 후기 작성 모달 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">후기 작성</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <form id="review-form" onsubmit="submitReview(event)">

      <div class="form-section">
        <div class="form-section-title">📋 시설 정보</div>

        <div class="form-group">
          <label class="form-label">시설 유형 <span class="required">*</span></label>
          <select class="form-select" id="f-type" required>
            <option value="">선택하세요</option>
            <option value="요양원">요양원</option>
            <option value="요양병원">요양병원</option>
            <option value="주야간보호">주야간보호센터</option>
            <option value="방문요양">방문요양</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">시설명 <span class="required">*</span></label>
          <input type="text" class="form-input" id="f-name" placeholder="예: 서울요양원" required />
        </div>

        <div class="form-group">
          <label class="form-label">지역 <span class="required">*</span></label>
          <select class="form-select" id="f-region" required>
            <option value="">선택하세요</option>
            <option value="서울">서울</option>
            <option value="경기">경기</option>
            <option value="인천">인천</option>
            <option value="부산">부산</option>
            <option value="대구">대구</option>
            <option value="광주">광주</option>
            <option value="대전">대전</option>
            <option value="울산">울산</option>
            <option value="세종">세종</option>
            <option value="강원">강원</option>
            <option value="충북">충북</option>
            <option value="충남">충남</option>
            <option value="전북">전북</option>
            <option value="전남">전남</option>
            <option value="경북">경북</option>
            <option value="경남">경남</option>
            <option value="제주">제주</option>
          </select>
        </div>
      </div>

      <div class="form-section">
        <div class="form-section-title">🔐 이용 인증</div>
        <div class="form-group">
          <label class="form-label">장기요양인정번호 <span class="required">*</span></label>
          <input type="text" class="form-input" id="f-care-num" placeholder="숫자 10-12자리" required />
          <div class="form-hint">장기요양인정서에 기재된 번호입니다. 개인정보 보호를 위해 암호화 저장됩니다.</div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">입소(이용 시작)일 <span class="required">*</span></label>
            <input type="date" class="form-input" id="f-admit" required />
          </div>
          <div class="form-group">
            <label class="form-label">퇴소(이용 종료)일</label>
            <input type="date" class="form-input" id="f-discharge" />
            <div class="form-hint">재원 중이면 비워두세요</div>
          </div>
        </div>
      </div>

      <div class="form-section">
        <div class="form-section-title">⭐ 항목별 평점</div>
        <div class="star-rating-group">
          <div class="star-item overall-star-item">
            <div class="star-item-label" style="font-weight:700; color: var(--text);">전체 만족도</div>
            <div class="stars" data-field="overall"></div>
          </div>
          <div class="star-item">
            <div class="star-item-label">🍱 식사</div>
            <div class="stars" data-field="food"></div>
          </div>
          <div class="star-item">
            <div class="star-item-label">🧹 청결</div>
            <div class="stars" data-field="clean"></div>
          </div>
          <div class="star-item">
            <div class="star-item-label">👩‍⚕️ 직원 친절</div>
            <div class="stars" data-field="staff"></div>
          </div>
          <div class="star-item">
            <div class="star-item-label">🚪 면회 자유도</div>
            <div class="stars" data-field="visit"></div>
          </div>
        </div>
      </div>

      <div class="form-section">
        <div class="form-section-title">✍️ 솔직한 후기</div>
        <div class="form-group">
          <textarea class="form-textarea" id="f-content" placeholder="실제 경험을 솔직하게 남겨주세요. 식사 질, 직원 태도, 청결 상태, 의료 지원, 가족 소통 등 다른 분들에게 도움이 될 정보를 공유해주세요. (최소 50자)" required oninput="updateCharCount(this)"></textarea>
          <div class="char-count"><span id="char-count">0</span> / 2000자 (최소 50자)</div>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="submit-btn">익명으로 후기 등록하기</button>
    </form>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const ratings = { overall: 0, food: 0, clean: 0, staff: 0, visit: 0 };
  let currentPage = 1;
  let currentQuery = {};

  // 별점 초기화
  document.querySelectorAll('.stars').forEach(starGroup => {
    const field = starGroup.dataset.field;
    for (let i = 1; i <= 5; i++) {
      const star = document.createElement('span');
      star.className = 'star';
      star.textContent = '★';
      star.dataset.val = i;
      star.addEventListener('click', () => setRating(field, i, starGroup));
      star.addEventListener('mouseenter', () => hoverRating(field, i, starGroup));
      starGroup.appendChild(star);
    }
    starGroup.addEventListener('mouseleave', () => renderStars(field, starGroup));
  });

  function setRating(field, val, group) {
    ratings[field] = val;
    renderStars(field, group);
  }

  function hoverRating(field, val, group) {
    group.querySelectorAll('.star').forEach((s, i) => {
      s.classList.toggle('on', i < val);
    });
  }

  function renderStars(field, group) {
    group.querySelectorAll('.star').forEach((s, i) => {
      s.classList.toggle('on', i < ratings[field]);
    });
  }

  function updateCharCount(el) {
    document.getElementById('char-count').textContent = el.value.length;
  }

  function openModal() {
    document.getElementById('modal').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('active');
    document.body.style.overflow = '';
  }

  function showToast(msg, type = '') {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.className = `toast ${type} show`;
    setTimeout(() => toast.classList.remove('show'), 3000);
  }

  async function submitReview(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');

    const content = document.getElementById('f-content').value;
    if (content.length < 50) return showToast('후기는 50자 이상 작성해주세요.', 'error');

    const allRated = Object.values(ratings).every(r => r > 0);
    if (!allRated) return showToast('모든 항목의 별점을 선택해주세요.', 'error');

    const data = {
      facility_name: document.getElementById('f-name').value,
      facility_type: document.getElementById('f-type').value,
      region: document.getElementById('f-region').value,
      care_number: document.getElementById('f-care-num').value,
      admission_date: document.getElementById('f-admit').value,
      discharge_date: document.getElementById('f-discharge').value,
      rating_food: ratings.food,
      rating_clean: ratings.clean,
      rating_staff: ratings.staff,
      rating_visit: ratings.visit,
      rating_overall: ratings.overall,
      content
    };

    btn.disabled = true;
    btn.textContent = '등록 중...';

    try {
      const res = await fetch('/api/reviews', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      const result = await res.json();

      if (res.ok) {
        showToast('후기가 등록되었습니다. 감사합니다!', 'success');
        closeModal();
        document.getElementById('review-form').reset();
        Object.keys(ratings).forEach(k => ratings[k] = 0);
        document.querySelectorAll('.star').forEach(s => s.classList.remove('on'));
        document.getElementById('char-count').textContent = '0';
        loadReviews();
      } else {
        showToast(result.error || '오류가 발생했습니다.', 'error');
      }
    } catch {
      showToast('서버 연결에 실패했습니다.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '익명으로 후기 등록하기';
    }
  }

  function search() {
    currentPage = 1;
    currentQuery = {
      facility_name: document.getElementById('search-input').value,
      facility_type: document.getElementById('filter-type').value,
      region: ''
    };
    loadReviews();
  }

  // 기관유형코드 → 표시용 분류
  function adminTypeInfo(code) {
    const map = {
      'A04': { label: '요양원(시설급여)', cls: 'home' },
      'A03': { label: '요양병원', cls: 'home' },
      'C01': { label: '방문요양', cls: 'visit' },
      'C02': { label: '방문목욕', cls: 'visit' },
      'C04': { label: '방문간호', cls: 'visit' },
      'C05': { label: '주야간보호', cls: 'day' },
      'C06': { label: '단기보호', cls: 'day' }
    };
    return map[code] || { label: '재가/복지기관', cls: 'etc' };
  }

  async function searchFacilities() {
    const keyword = document.getElementById('search-input').value.trim();
    const region = document.getElementById('filter-region').value;
    const container = document.getElementById('facilities-container');
    const countEl = document.getElementById('facility-result-count');

    if (!keyword && !region) {
      container.innerHTML = '';
      countEl.textContent = '';
      return;
    }

    container.innerHTML = '<div class="facility-notice">검색 중입니다...</div>';

    try {
      const params = new URLSearchParams();
      if (keyword) params.append('keyword', keyword);
      if (region) params.append('region', region);

      const res = await fetch(`/api/facilities/search?${params}`);
      const data = await res.json();

      if (data.notice) {
        container.innerHTML = `<div class="facility-notice">${data.notice}</div>`;
        countEl.textContent = '';
        return;
      }

      countEl.textContent = `총 ${data.totalCount.toLocaleString()}개`;

      if (!data.items || data.items.length === 0) {
        container.innerHTML = `<div class="facility-notice">검색 결과가 없어요. 지역을 선택하거나 시설명을 다시 확인해주세요.</div>`;
        return;
      }

      container.innerHTML = data.items.slice(0, 30).map(item => {
        const type = adminTypeInfo(item.adminPttnCd);
        return `
          <div class="facility-card">
            <div class="facility-card-info">
              <div class="facility-card-name">${item.adminNm}</div>
              <div class="facility-card-meta">
                <span class="facility-type-tag ${type.cls}">${type.label}</span>
                <span class="facility-card-date">지정일 ${formatYmd(item.longTermPeribRgtDt)}</span>
              </div>
            </div>
            <button class="facility-card-btn" onclick="goWriteReviewFor('${item.adminNm.replace(/'/g, "\\'")}')">후기 보기</button>
          </div>
        `;
      }).join('');
    } catch (err) {
      container.innerHTML = '<div class="facility-notice">검색 중 오류가 발생했어요. 잠시 후 다시 시도해주세요.</div>';
    }
  }

  function formatYmd(str) {
    if (!str || str.length !== 8) return '-';
    return `${str.slice(0,4)}.${str.slice(4,6)}.${str.slice(6,8)}`;
  }

  function goWriteReviewFor(name) {
    document.getElementById('search-input').value = name;
    currentQuery = { facility_name: name };
    loadReviews();
    document.getElementById('f-name').value = name;
    window.scrollTo({ top: document.querySelector('.main').offsetTop - 60, behavior: 'smooth' });
  }

  // 초기 로딩
  loadReviews();

  document.getElementById('search-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') searchFacilities();
  });

  async function loadReviews() {
    const params = new URLSearchParams({ ...currentQuery, page: currentPage });
    const res = await fetch(`/api/reviews?${params}`);
    const { reviews, total } = await res.json();

    document.getElementById('total-count').textContent = total.toLocaleString();
    document.getElementById('result-count').textContent = `총 ${total}개`;

    const container = document.getElementById('reviews-container');

    if (reviews.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">💬</div>
          <div class="empty-title">아직 후기가 없어요</div>
          <div class="empty-desc">이 시설을 이용해보셨나요?<br>첫 번째 솔직한 후기를 남겨주세요!</div>
        </div>`;
      return;
    }

    container.innerHTML = reviews.map(r => `
      <div class="review-card">
        <div class="card-top">
          <div class="facility-info">
            <div class="facility-name">${r.facility_name}</div>
            <div class="facility-meta">
              <span class="facility-type-badge">${r.facility_type}</span>
              <span class="region-text">${r.region}</span>
            </div>
          </div>
          <div class="overall-score">
            <span class="score-num">${r.rating_overall}.0</span>
            <span class="score-label">종합</span>
          </div>
        </div>

        <div class="rating-bars">
          ${[
            ['식사', r.rating_food],
            ['청결', r.rating_clean],
            ['직원', r.rating_staff],
            ['면회', r.rating_visit]
          ].map(([label, val]) => `
            <div class="rating-bar-item">
              <span class="bar-label">${label}</span>
              <div class="bar-track">
                <div class="bar-fill" style="width:${val*20}%"></div>
              </div>
              <span class="bar-val">${val}</span>
            </div>
          `).join('')}
        </div>

        <div class="review-content collapsed" id="content-${r.id}">${r.content}</div>
        <button class="expand-btn" onclick="toggleExpand(${r.id}, this)">더 보기 ▾</button>

        <div class="card-bottom">
          <span class="card-meta">${formatDate(r.created_at)} · 인증된 후기</span>
          <div class="card-actions">
            <button class="action-btn ${r.helped ? 'helpful' : ''}" onclick="markHelpful(${r.id}, this)">
              👍 도움이 됐어요 ${r.helpful_count > 0 ? r.helpful_count : ''}
            </button>
            <button class="action-btn" onclick="reportReview(${r.id})">신고</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function toggleExpand(id, btn) {
    const el = document.getElementById(`content-${id}`);
    if (el.classList.contains('collapsed')) {
      el.classList.remove('collapsed');
      btn.textContent = '접기 ▴';
    } else {
      el.classList.add('collapsed');
      btn.textContent = '더 보기 ▾';
    }
  }

  async function markHelpful(id, btn) {
    await fetch(`/api/reviews/${id}/helpful`, { method: 'POST' });
    btn.classList.add('helpful');
    showToast('도움이 됐어요!', 'success');
  }

  async function reportReview(id) {
    const reason = prompt('신고 사유를 입력해주세요:');
    if (!reason) return;
    await fetch(`/api/reviews/${id}/report`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ reason })
    });
    showToast('신고가 접수되었습니다.', 'success');
  }

  function formatDate(str) {
    const d = new Date(str);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  }

  // 초기 로딩
  loadReviews();
</script>
</body>
</html>
